name = "crane-mcp-remote-staging"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Plan v3.1 §D.1: regenerate src/generated/build-info.ts before every deploy.
[build]
command = "node ../../scripts/inject-version.mjs --service=crane-mcp-remote"
cwd = "."

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "CraneMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CraneMCP"]

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "9105794bbfbd4835a2013810bd1bed3e"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "7ad676059255437aa54eb18e72fd3975"

[vars]
CRANE_CONTEXT_API_URL = "https://crane-context-staging.automation-ab6.workers.dev"
ALLOWED_GITHUB_USERS = "SMDurgan"
ENVIRONMENT = "staging"

# Secrets (set via: wrangler secret put <NAME>)
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# CRANE_CONTEXT_KEY
# COOKIE_ENCRYPTION_KEY

# Production
[env.production]
name = "crane-mcp-remote"

[env.production.durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "CraneMCP" }
]

# KV namespace IDs are populated after running:
#   wrangler kv namespace create OAUTH_KV --env production
#   wrangler kv namespace create CACHE_KV --env production
[[env.production.kv_namespaces]]
binding = "OAUTH_KV"
id = "218114d241a74fc4af2aa0ad7a20d8e5"

[[env.production.kv_namespaces]]
binding = "CACHE_KV"
id = "4894c5edc332485ba155bda8ac72a342"

[env.production.vars]
CRANE_CONTEXT_API_URL = "https://crane-context.automation-ab6.workers.dev"
ALLOWED_GITHUB_USERS = "SMDurgan"
ENVIRONMENT = "production"
