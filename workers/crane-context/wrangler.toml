name = "crane-context-staging"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Plan v3.1 §D.1: regenerate src/generated/build-info.ts before every
# `wrangler deploy` so the /version endpoint reports the exact commit
# and build timestamp. The injector refuses to run if GITHUB_SHA
# disagrees with `git rev-parse HEAD` (supply-chain guard).
[build]
command = "node ../../scripts/inject-version.mjs --service=crane-context"
cwd = "."

# Plan v3.1 §B.6 / issue #454: deploy-heartbeats reconciliation cron.
# Fires every 6 hours on staging (every hour on prod; see env.production).
# Walks all active heartbeat rows, cross-checks with GitHub API via
# GH_TOKEN (wrangler secret), catches up any missed webhook deliveries.
[triggers]
crons = ["0 */6 * * *"]

# Default = staging
[[d1_databases]]
binding = "DB"
database_name = "crane-context-db-staging"
database_id = "b2182c5b-6f83-47e8-87ee-3dc62511c24e"
preview_database_id = "0d8f52b3-a06c-4b20-b226-bcb76a6b18d4"

[vars]
CONTEXT_SESSION_STALE_MINUTES = "45"
IDEMPOTENCY_TTL_SECONDS = "3600"
HEARTBEAT_INTERVAL_SECONDS = "600"
HEARTBEAT_JITTER_SECONDS = "120"
# Plan v3.1 §D.1: explicit environment marker for /version endpoint.
ENVIRONMENT = "staging"
# PR A2: gates the notification auto-resolver. Stays disabled in staging
# until PR A2 is verified end-to-end via the staging integration test.
# Flipped to "true" in PR A4 after the production backfill completes.
NOTIFICATIONS_AUTO_RESOLVE_ENABLED = "true"

# Secrets (set via: wrangler secret put <NAME>)
# CONTEXT_RELAY_KEY = "<same-as-relay-key>"

# Production - preserves existing worker name and URL
[env.production]
name = "crane-context"

[[env.production.d1_databases]]
binding = "DB"
database_name = "crane-context-db-prod"
database_id = "afa6ecea-25f6-4ed6-9f4d-f81fd0409e2e"

[env.production.vars]
CONTEXT_SESSION_STALE_MINUTES = "45"
IDEMPOTENCY_TTL_SECONDS = "3600"
HEARTBEAT_INTERVAL_SECONDS = "600"
HEARTBEAT_JITTER_SECONDS = "120"
# Plan v3.1 §D.1: explicit environment marker for /version endpoint.
ENVIRONMENT = "production"
NOTIFICATIONS_AUTO_RESOLVE_ENABLED = "true"
