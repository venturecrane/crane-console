name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [crane-context, crane-watch, crane-mcp-remote]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        # Triggers the root postinstall which builds @venturecrane/crane-test-harness
        # so workers that consume it via `file:` deps can resolve dist/ during their own install.
        run: npm ci

      - name: Install worker dependencies
        working-directory: workers/${{ matrix.worker }}
        run: npm ci

      - name: Run npm audit
        working-directory: workers/${{ matrix.worker }}
        run: |
          echo "## NPM Audit: ${{ matrix.worker }}" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit-output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "### Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat audit-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "No high/critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Plan §C.5 fleet-lint #1: never hardcode the gitleaks version. The
      # previous template pinned to gitleaks_8.21.2 which broke the entire
      # fleet's security pipeline. We can't use gitleaks/gitleaks-action@v2
      # because it requires a paid license for org repos. Install pattern
      # below queries the GitHub releases API for the latest tag, so the
      # version stays current automatically. Config lives in .gitleaks.toml.
      - name: Install Gitleaks (latest release)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | head -1 | sed -E 's/.*"v?([^"]+)".*/\1/')
          echo "Installing gitleaks v${GITLEAKS_VERSION}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          echo "## Secret Detection" >> $GITHUB_STEP_SUMMARY
          if ./gitleaks detect --source . --verbose --no-git --config .gitleaks.toml 2>&1 | tee gitleaks-output.txt; then
            echo "No secrets detected." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Secrets Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat gitleaks-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  typescript:
    name: TypeScript Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [crane-context, crane-watch, crane-mcp-remote]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install root dependencies
        # Triggers the root postinstall which builds @venturecrane/crane-test-harness
        # so workers that consume it via `file:` deps can resolve dist/ during their own install.
        run: npm ci

      - name: Install worker dependencies
        working-directory: workers/${{ matrix.worker }}
        run: npm ci

      - name: TypeScript check
        working-directory: workers/${{ matrix.worker }}
        run: npx tsc --noEmit

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, gitleaks, typescript]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Security Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.npm-audit.result }}" == "success" ]; then
            echo "- NPM Audit: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- NPM Audit: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.gitleaks.result }}" == "success" ]; then
            echo "- Secret Detection: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Secret Detection: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.typescript.result }}" == "success" ]; then
            echo "- TypeScript: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- TypeScript: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if any check failed
          if [ "${{ needs.npm-audit.result }}" != "success" ] || \
             [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.typescript.result }}" != "success" ]; then
            echo ""
            echo "One or more security checks failed."
            exit 1
          fi
