name: Fleet Ops Health

# Plan §C.4 / §C.5: weekly cross-venture audit. Two layers:
#   1. fleet-lint.sh   — static workflow file antipatterns (no API needed)
#   2. fleet-ops-health.sh — runtime GitHub state via gh api
#
# fleet-lint fails the job on antipatterns (script exits 1).
# fleet-ops-health ingests findings into the fleet_health_findings D1
# table and lets crane_sos surface them via the Fleet Health section.
# The job fails only on pipeline errors (script crash, ingest API
# non-200) — finding count is informational, not a failure signal.
# This avoids duplicating the alarm channel: SOS Fleet Health is the
# single source of truth for fleet drift.

on:
  schedule:
    # Mondays at 13:00 UTC (06:00 MST). Plan §C.4 cadence.
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  fleet-lint:
    name: Fleet Lint (static patterns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fleet-lint
        run: |
          bash scripts/fleet-lint.sh --ci
        # The script exits 1 on error and 0 on warn-only.

  fleet-ops-health:
    name: Fleet Ops Health (runtime GitHub state)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate gh
        run: |
          # GH_FLEET_AUDIT_TOKEN is a fine-grained PAT with read-only
          # access across the venturecrane and smdservices orgs. See
          # docs/process/add-new-venture.md and the rotation runbook.
          echo "${{ secrets.GH_FLEET_AUDIT_TOKEN }}" | gh auth login --with-token

      - name: Run fleet-ops-health (json)
        run: |
          bash scripts/fleet-ops-health.sh --json > fleet-health.json
          echo "## Fleet Ops Health" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat fleet-health.json | jq . >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Ingest findings into crane-context (Plan §C.4)
        # Persist the full snapshot into the fleet_health_findings D1
        # table via the admin ingest endpoint. Each ingest is a full-state
        # refresh: the server auto-resolves any open finding whose
        # (repo, finding_type) is no longer present in this snapshot, so
        # the SOS's Fleet Health section always reflects the latest audit.
        #
        # Uses CRANE_ADMIN_KEY (same secret as sync-docs.yml). Missing
        # secret is a hard failure — we don't silently drop findings.
        env:
          CRANE_ADMIN_KEY: ${{ secrets.CRANE_ADMIN_KEY }}
          API_BASE: https://crane-context.automation-ab6.workers.dev
        run: |
          if [ -z "$CRANE_ADMIN_KEY" ]; then
            echo "::error::CRANE_ADMIN_KEY secret is not set — cannot ingest fleet health findings"
            exit 1
          fi

          # The script emits a payload matching the ingest endpoint shape
          # verbatim ({"org","timestamp","status","findings":[{"repo","rule","severity","message"}]}).
          # Post it as-is; the endpoint normalizes and validates.
          HTTP_CODE=$(curl -s -o /tmp/ingest-response.json -w "%{http_code}" \
            -X POST "$API_BASE/admin/fleet-health/ingest" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Key: $CRANE_ADMIN_KEY" \
            --data-binary @fleet-health.json)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Ingest failed with HTTP $HTTP_CODE"
            cat /tmp/ingest-response.json
            exit 1
          fi

          echo "### Ingest result" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq . /tmp/ingest-response.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          INSERTED=$(jq -r '.inserted' /tmp/ingest-response.json)
          UPDATED=$(jq -r '.updated' /tmp/ingest-response.json)
          RESOLVED=$(jq -r '.resolved' /tmp/ingest-response.json)
          echo "Ingested fleet health findings: $INSERTED new, $UPDATED refreshed, $RESOLVED auto-resolved"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fleet-health-report
          path: fleet-health.json
          retention-days: 90

      - name: Summarize finding count
        # Informational only — not a failure signal. Findings live in
        # the fleet_health_findings D1 table (ingested above) and are
        # surfaced via crane_sos's Fleet Health section. Pipeline errors
        # (script crash, ingest non-200) already failed the job earlier.
        run: |
          status=$(jq -r '.status' fleet-health.json)
          finding_count=$(jq -r '.findings | length' fleet-health.json)
          echo "Fleet health status: $status ($finding_count finding(s))"
          if [ "$status" != "pass" ]; then
            echo "::notice::Fleet health audit found $finding_count finding(s) — see crane_sos Fleet Health section for details."
          fi
