name: D1 Nightly Backup

on:
  schedule:
    # Daily at 07:17 UTC (avoid :00 stampede)
    - cron: '17 7 * * *'
  workflow_dispatch:

concurrency:
  group: d1-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Export ${{ matrix.database }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: crane-context-db-prod
            env_flag: '--env production'
            working-directory: workers/crane-context
          - database: crane-context-db-staging
            env_flag: ''
            working-directory: workers/crane-context
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install wrangler
        run: npm ci
        working-directory: ${{ matrix.working-directory }}

      - name: Export D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          mkdir -p backups
          STEM="backup-${{ matrix.database }}-$(date -u +%Y%m%dT%H%M%SZ)"
          OUT="backups/${STEM}.sql"
          (cd "${{ matrix.working-directory }}" && \
            npx wrangler d1 export DB ${{ matrix.env_flag }} \
              --output="${GITHUB_WORKSPACE}/${OUT}" --remote)
          ls -lh "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "BACKUP_FILE=$OUT" >> "$GITHUB_ENV"
          echo "BACKUP_NAME=$STEM" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_NAME }}
          path: |
            ${{ env.BACKUP_FILE }}
            ${{ env.BACKUP_FILE }}.sha256
          retention-days: 90
          if-no-files-found: error

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: backup
    if: failure()
    steps:
      - name: Report
        run: |
          echo "::error::D1 nightly backup failed. See backup job logs."
          exit 1
