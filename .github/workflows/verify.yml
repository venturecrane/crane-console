name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck, Lint, Format, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install worker dependencies
        run: |
          npm ci --prefix workers/crane-context
          npm ci --prefix workers/crane-watch
          npm ci --prefix workers/crane-mcp-remote

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Skill triplet drift check
        # Catches the case where a skill author edits .claude/commands/<x>.md
        # without regenerating the .agents/skills/ and .gemini/commands/ peers.
        # This is the file-format half of the EOS gate; the runtime probe lives
        # in .github/workflows/pr-eos-gate.yml.
        run: scripts/sync-commands.sh --check
