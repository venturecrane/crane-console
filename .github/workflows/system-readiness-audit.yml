name: System Readiness Audit

# Plan v3.1 §D.7. Runs the oracle script on every PR, weekly on a
# schedule, and on-demand. Verifies deployed state, secrets,
# end-to-end behavior, and fleet health across 37 invariants.

on:
  pull_request:
    branches: [main]
  schedule:
    # Monday 13:15 UTC (right after fleet-ops-health's 13:00 run)
    - cron: '15 13 * * 1'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  audit:
    name: Readiness audit (${{ github.event.inputs.env || 'staging' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install Infisical CLI
        run: |
          # The legacy cloudsmith repo serves v0.38 (CI itself prints
          # "Please update to the new installation script"). v0.38 doesn't
          # honor INFISICAL_TOKEN env var, so subsequent `infisical secrets
          # get` calls fail despite a successful login. Use the current
          # artifacts endpoint instead.
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical
          infisical --version

      # Behavior on missing Infisical machine identity:
      #   - Internal PRs to main + scheduled runs: hard-fail (this is a guardrail).
      #   - Fork PRs (cannot read secrets): clean skip with warning.
      # Readiness audits that silently skip provide false assurance about prod.
      - name: Authenticate Infisical
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET }}
          # Treat both fork PRs and dependabot PRs as "restricted" — neither
          # has access to repo secrets by default, so the strict-gate must
          # skip rather than hard-fail. Dependabot uses a separate secret
          # store this workflow doesn't depend on.
          IS_RESTRICTED: ${{ github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name != github.repository || github.actor == 'dependabot[bot]') }}
        run: |
          if [ -z "$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" ] || [ -z "$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" ]; then
            if [ "$IS_RESTRICTED" = "true" ]; then
              echo "::warning::Skipping on restricted PR (fork or dependabot — secrets not available)."
              echo "INFISICAL_SKIP=1" >> $GITHUB_ENV
              exit 0
            else
              echo "::error::INFISICAL_UNIVERSAL_AUTH_CLIENT_ID and ..._CLIENT_SECRET are required for this guardrail."
              echo "Configure with: gh secret set INFISICAL_UNIVERSAL_AUTH_CLIENT_ID and gh secret set INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET"
              exit 1
            fi
          fi
          # `infisical login` on GH runners can't persist credentials to a
          # keyring across separate `run:` steps. Capture the access token in
          # --plain --silent mode and export via $GITHUB_ENV as INFISICAL_TOKEN
          # so subsequent steps' `infisical secrets get` see the auth.
          # Mask the token first so it never appears in workflow logs.
          TOKEN=$(infisical login \
            --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --plain --silent)
          if [ -z "$TOKEN" ]; then
            echo "::error::infisical login succeeded but produced no token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "INFISICAL_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          # Machine-identity auth requires explicit project ID — the
          # .infisical.json workspaceId field is only consumed by
          # user-account auth, not machine identity. Read the project ID
          # from .infisical.json so a workspace move doesn't drift.
          PROJECT_ID=$(jq -r '.workspaceId' .infisical.json)
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::error::Could not read workspaceId from .infisical.json"
            exit 1
          fi
          echo "INFISICAL_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

          # Probe scope: the audit needs to read /vc on prod. If the machine
          # identity authenticated but lacks read scope on /vc, skip the audit
          # (consistent with the missing-creds skip above) rather than fail
          # unrelated PRs. The remediation is in the Infisical project UI:
          # grant the universal-auth identity Secrets:Read on /vc prod.
          if ! infisical secrets get CONTEXT_RELAY_KEY --path /vc --env prod --plain >/dev/null 2>&1; then
            echo "::warning::Infisical machine identity authenticated but cannot read /vc on prod — skipping audit. Grant the universal-auth identity 'Secrets: Read' scope on /vc (env: prod) in the Infisical project to enable the audit."
            echo "INFISICAL_SKIP=1" >> $GITHUB_ENV
            exit 0
          fi

      - name: Determine target env
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.env }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "env=$INPUT_ENV" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            echo "env=staging" >> "$GITHUB_OUTPUT"
          else
            echo "env=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Run readiness audit
        if: env.INFISICAL_SKIP != '1'
        id: audit
        run: |
          set +e
          bash scripts/system-readiness-audit.sh \
            --env=${{ steps.env.outputs.env }} \
            --ci \
            --skip-group=E \
            --skip-group=F \
            --skip-group=G \
            --json > /tmp/readiness.json
          status=$?

          # Also print TTY output to the logs
          bash scripts/system-readiness-audit.sh \
            --env=${{ steps.env.outputs.env }} \
            --skip-group=E \
            --skip-group=F \
            --skip-group=G || true

          echo "## Readiness Audit Result" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq . /tmp/readiness.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ $status -ne 0 ]; then
            echo "::error::Readiness audit failed"
            exit 1
          fi

      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: readiness-audit-${{ steps.env.outputs.env }}
          path: /tmp/readiness.json
          retention-days: 90
