name: Eval - Memory Recall

# Runs the memory-recall eval harness against the staging worker on PRs that
# touch the recall path. Computes MRR@5 and fails if it drops below baseline
# minus tolerance (eval/run-memory-recall.ts).
#
# Tolerance and baseline live in eval/baseline.json. Initial target at our
# small corpus is MRR@5 >= 0.4 (see eval/README.md).

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/crane-mcp/src/tools/memory*.ts'
      - 'packages/crane-mcp/src/lib/crane-api.ts'
      - 'workers/crane-context/src/notes.ts'
      - 'workers/crane-context/src/endpoints/notes.ts'
      - 'workers/crane-context/migrations/**memory**.sql'
      - 'workers/crane-context/migrations/**fts5**.sql'
      - 'eval/**'
  workflow_dispatch:

jobs:
  eval:
    name: MRR@5 against staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      # Behavior on missing secret:
      #   - Internal PRs to main: hard-fail with explicit error.
      #   - Fork PRs (cannot read secrets): clean skip with warning.
      # A skipped guardrail that exits success silently is worse than no guardrail.
      - name: Verify required secrets
        env:
          KEY: ${{ secrets.CRANE_RELAY_KEY_STAGING }}
          IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          if [ -z "$KEY" ]; then
            if [ "$IS_FORK" = "true" ]; then
              echo "::warning::Skipping on fork PR (secrets not available to forks)."
              echo "EVAL_SKIP=true" >> "$GITHUB_ENV"
            else
              echo "::error::CRANE_RELAY_KEY_STAGING is required for this guardrail on internal PRs."
              echo "Configure with: gh secret set CRANE_RELAY_KEY_STAGING"
              exit 1
            fi
          fi

      - name: Run memory-recall eval
        if: env.EVAL_SKIP != 'true'
        env:
          CRANE_RELAY_KEY: ${{ secrets.CRANE_RELAY_KEY_STAGING }}
          CRANE_CONTEXT_BASE: https://crane-context-staging.automation-ab6.workers.dev
        run: npm run eval:memory-recall
