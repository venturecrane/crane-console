name: Deploy Workers

on:
  workflow_run:
    workflows: ['Verify']
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy ${{ matrix.worker }} to staging
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      matrix:
        worker: [crane-context, crane-watch, crane-mcp-remote]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_run, check out the commit that triggered Verify
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Check for worker changes
        id: changes
        if: github.event_name == 'workflow_run'
        run: |
          # Compare against parent commit to detect worker-related changes
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Deploy if worker files, root config, or workflow itself changed
          if echo "$CHANGED" | grep -qE "^(workers/${{ matrix.worker }}/|package-lock\.json$|tsconfig\.json$|\.github/workflows/deploy\.yml$)"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "No relevant changes for ${{ matrix.worker }}, skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: workers/${{ matrix.worker }}/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: npm ci --prefix workers/${{ matrix.worker }}

      - name: Deploy to staging
        if: steps.changes.outputs.skip != 'true'
        run: npx wrangler deploy
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke-test:
    name: Smoke tests (staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: >-
      !cancelled() && !failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for edge propagation
        run: sleep 5

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical

      # Plan v3.1 §D.5 / D-8: replace inline health checks with the
      # richer smoke-test-e2e.sh that exercises version + schema
      # verify + auth gates + the Track A mutation path (red/green
      # auto-resolve) + fleet-health freshness + deploy-heartbeats.
      - name: Authenticate Infisical (if configured)
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET }}
        run: |
          if [ -z "$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" ] || [ -z "$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" ]; then
            echo "::warning::Infisical machine identity not configured — falling back to health-only check"
            echo "FALLBACK=1" >> $GITHUB_ENV
            exit 0
          fi
          infisical login \
            --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --silent

      - name: Run smoke-test-e2e.sh
        if: env.FALLBACK != '1'
        run: |
          bash scripts/smoke-test-e2e.sh --env=staging --ci

      - name: Fallback — basic health check only
        if: env.FALLBACK == '1'
        run: |
          for attempt in 1 2 3; do
            if curl -sf https://crane-context-staging.automation-ab6.workers.dev/health | jq -e '.status == "healthy"'; then
              echo "healthy"
              exit 0
            fi
            sleep 5
          done
          exit 1

  deploy-production:
    name: Deploy ${{ matrix.worker }} to production
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production'
    environment: production
    strategy:
      matrix:
        worker: [crane-context, crane-watch, crane-mcp-remote]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: workers/${{ matrix.worker }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix workers/${{ matrix.worker }}

      - name: Deploy to production
        run: npx wrangler deploy --env production
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
