name: Deploy Workers

on:
  workflow_run:
    workflows: ['Verify']
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy ${{ matrix.worker }} to staging
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      matrix:
        worker: [crane-context, crane-watch, crane-mcp-remote]
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout — workflow_run trigger has `branches: [main]` filter (line 6); head_sha always resolves to a main-branch commit, not attacker-controllable PR code
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # For workflow_run, check out the commit that triggered Verify
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Check for worker changes
        id: changes
        if: github.event_name == 'workflow_run'
        run: |
          # Compare against parent commit to detect worker-related changes
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Deploy if worker files, root config, or workflow itself changed
          if echo "$CHANGED" | grep -qE "^(workers/${{ matrix.worker }}/|package-lock\.json$|tsconfig\.json$|\.github/workflows/deploy\.yml$)"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "No relevant changes for ${{ matrix.worker }}, skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: workers/${{ matrix.worker }}/package-lock.json

      # crane-context imports @venturecrane/crane-contracts via a `file:`
      # dependency. When npm installs the file dep it respects the package's
      # `"files": ["dist"]` allow-list, so `dist/` must exist on disk before
      # the worker install — otherwise wrangler's esbuild pass fails to
      # resolve the package. crane-contracts is a workspace package with no
      # standalone lockfile, so `npm install` (not `npm ci`) is required.
      # Only crane-context depends on contracts today.
      - name: Build @venturecrane/crane-contracts
        if: steps.changes.outputs.skip != 'true' && matrix.worker == 'crane-context'
        run: |
          npm install --no-audit --no-fund --prefix packages/crane-contracts
          npm run build --prefix packages/crane-contracts

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: npm ci --prefix workers/${{ matrix.worker }}

      - name: Deploy to staging
        if: steps.changes.outputs.skip != 'true'
        run: npx wrangler deploy
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The checkout step above pins to workflow_run.head_sha. The default
          # GITHUB_SHA env var is whatever main HEAD is at trigger time, which
          # can differ if main moves between Verify completing and Deploy
          # starting (now common after rapid merges). The inject-version.mjs
          # supply-chain guard refuses to write a build-info that disagrees
          # with HEAD — so override GITHUB_SHA to match the checked-out ref.
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

  smoke-test:
    name: Smoke tests (staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: >-
      !cancelled() && !failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for edge propagation
        run: sleep 5

      - name: Install Infisical CLI
        run: |
          # The legacy cloudsmith repo serves v0.38 (CI itself prints
          # "Please update to the new installation script"). v0.38 doesn't
          # honor INFISICAL_TOKEN env var, so subsequent `infisical secrets
          # get` calls fail despite a successful login. Use the current
          # artifacts endpoint instead.
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical
          infisical --version

      # Plan v3.1 §D.5 / D-8: replace inline health checks with the
      # richer smoke-test-e2e.sh that exercises version + schema
      # verify + auth gates + the Track A mutation path (red/green
      # auto-resolve) + fleet-health freshness + deploy-heartbeats.
      - name: Authenticate Infisical (if configured)
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET }}
        run: |
          if [ -z "$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" ] || [ -z "$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" ]; then
            echo "::warning::Infisical machine identity not configured — falling back to health-only check"
            echo "FALLBACK=1" >> $GITHUB_ENV
            exit 0
          fi
          # `infisical login` on GH runners can't persist credentials to a
          # keyring across separate `run:` steps. Capture the access token in
          # --plain --silent mode and export via $GITHUB_ENV as INFISICAL_TOKEN
          # so subsequent steps' `infisical secrets get` see the auth.
          # Mask the token first so it never appears in workflow logs.
          TOKEN=$(infisical login \
            --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --plain --silent)
          if [ -z "$TOKEN" ]; then
            echo "::error::infisical login succeeded but produced no token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "INFISICAL_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          # Machine-identity auth requires explicit project ID — the
          # .infisical.json workspaceId field is only consumed by
          # user-account auth, not machine identity. Read the project ID
          # from .infisical.json so a workspace move doesn't drift.
          PROJECT_ID=$(jq -r '.workspaceId' .infisical.json)
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::error::Could not read workspaceId from .infisical.json"
            exit 1
          fi
          echo "INFISICAL_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Run smoke-test-e2e.sh
        if: env.FALLBACK != '1'
        run: |
          bash scripts/smoke-test-e2e.sh --env=staging --ci

      - name: Fallback — basic health check only
        if: env.FALLBACK == '1'
        run: |
          for attempt in 1 2 3; do
            if curl -sf https://crane-context-staging.automation-ab6.workers.dev/health | jq -e '.status == "healthy"'; then
              echo "healthy"
              exit 0
            fi
            sleep 5
          done
          exit 1

  deploy-production:
    name: Deploy ${{ matrix.worker }} to production
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production'
    environment: production
    strategy:
      matrix:
        worker: [crane-context, crane-watch, crane-mcp-remote]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: workers/${{ matrix.worker }}/package-lock.json

      # See staging job for why crane-context needs contracts built first.
      - name: Build @venturecrane/crane-contracts
        if: matrix.worker == 'crane-context'
        run: |
          npm install --no-audit --no-fund --prefix packages/crane-contracts
          npm run build --prefix packages/crane-contracts

      - name: Install dependencies
        run: npm ci --prefix workers/${{ matrix.worker }}

      - name: Deploy to production
        run: npx wrangler deploy --env production
        working-directory: workers/${{ matrix.worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
